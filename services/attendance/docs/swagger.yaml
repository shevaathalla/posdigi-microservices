basePath: /
definitions:
  dto.APIResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  dto.ClockInRequest:
    properties:
      notes:
        type: string
      user_id:
        type: string
    required:
    - user_id
    type: object
  dto.ClockOutRequest:
    properties:
      attendance_id:
        type: string
      notes:
        type: string
    required:
    - attendance_id
    type: object
host: localhost:8003
info:
  contact: {}
  description: Attendance service for employee clock-in/clockout and work hours tracking
  title: Attendance Service API
  version: "1.0"
paths:
  /attendance/clock-in:
    post:
      consumes:
      - application/json
      description: Record a clock-in for a user
      parameters:
      - description: Clock in details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ClockInRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Clock in
      tags:
      - attendance
  /attendance/clock-out:
    post:
      consumes:
      - application/json
      description: Record a clock-out for an attendance
      parameters:
      - description: Clock out details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ClockOutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Clock out
      tags:
      - attendance
  /attendance/history/{userId}:
    get:
      consumes:
      - application/json
      description: Get attendance history for a user with pagination
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Get attendance history
      tags:
      - attendance
  /attendance/summary/{userId}:
    get:
      consumes:
      - application/json
      description: Get attendance summary for a user within a date range
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Get attendance summary
      tags:
      - attendance
swagger: "2.0"
